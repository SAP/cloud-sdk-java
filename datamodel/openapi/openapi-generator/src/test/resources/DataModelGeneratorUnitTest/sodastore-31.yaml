openapi: 3.1.0
info:
  title: Soda Store API
  summary: A sample OAS 3.1 soda store API
  version: 1.0.0
  description: API for managing sodas in a soda store (OAS 3.1 test fixture)
  license:
    name: Apache 2.0
    identifier: Apache-2.0

paths:
  /sodas:
    get:
      summary: Get a list of all sodas
      operationId: getSodas
      x-sap-cloud-sdk-api-name: soda-shop
      responses:
        '200':
          description: A list of sodas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Soda'

    post:
      summary: Add a new soda to the store
      operationId: addSoda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSoda'
      responses:
        '201':
          description: The newly added soda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Soda'

  /sodas/{sodaId}:
    get:
      summary: Get details of a specific soda
      operationId: getSodaById
      parameters:
        - name: sodaId
          in: path
          description: ID of the soda to retrieve
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The requested soda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Soda'
        '404':
          description: Soda not found

    delete:
      summary: Delete a specific soda from the store
      operationId: deleteSodaById
      parameters:
        - name: sodaId
          in: path
          description: ID of the soda to delete
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Soda successfully deleted
        '404':
          description: Soda not found

components:
  schemas:
    Soda:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        brand:
          # Gap 1: OAS 3.1 nullable via type array instead of nullable: true
          type:
            - string
            - "null"
        flavor:
          type: string
        price:
          type: number
          format: float
        # Gap 2: OAS 3.1 numeric exclusiveMinimum (direct value, not a boolean modifier)
        rating:
          type: number
          exclusiveMinimum: 0
          exclusiveMaximum: 5
        description:
          # Gap 4: $ref with sibling description — valid in OAS 3.1
          $ref: '#/components/schemas/SodaDescription'
          description: Human-readable description override
        # Gap 10 / canonical nullable-$ref: anyOf with null type for nullable reference
        category:
          anyOf:
            - $ref: '#/components/schemas/SodaCategory'
            - type: "null"
      required:
        - name
        - flavor
        - price

    SodaDescription:
      type: string

    SodaCategory:
      type: object
      properties:
        name:
          type: string

    NewSoda:
      type: object
      properties:
        name:
          type: string
        brand:
          type:
            - string
            - "null"
        flavor:
          type: string
        price:
          type: number
          format: float
      required:
        - name
        - flavor
        - price
