openapi: 3.1.0
info:
  title: Soda Store API (mutualTLS)
  version: 1.0.0
  description: OAS 3.1 test fixture with mutualTLS security scheme (Gap 13)

paths:
  /sodas:
    get:
      summary: Get a list of all sodas
      operationId: getSodas
      security:
        - mtlsAuth: []
      responses:
        '200':
          description: A list of sodas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Soda'

components:
  securitySchemes:
    mtlsAuth:
      type: mutualTLS
      description: Client certificate issued via the production dashboard.

  schemas:
    Soda:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      required:
        - name
