openapi: 3.1.0
info:
  title: OAS 3.1 $ref with Sibling Properties
  version: 1.0.0

paths:
  /sodas:
    get:
      operationId: getSodas
      responses:
        '200':
          description: A soda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Soda'

components:
  schemas:
    SodaDescription:
      type: string
      description: Soda description

    Soda:
      type: object
      properties:
        name:
          type: string
        description:
          # $ref with a sibling property — valid in OAS 3.1
          $ref: '#/components/schemas/SodaDescription'
          description: Soda description as part of the Soda object
      required:
        - name
